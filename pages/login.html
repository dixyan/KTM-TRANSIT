<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#0f172a">
  <link rel="manifest" href="../manifest.json">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="KTM Transit">
  <link rel="apple-touch-icon" href="../assets/icons/icon-192.png">
  <link rel="icon" type="image/png" sizes="32x32" href="../assets/icons/favicon-32.png">
  <title>KTM Transit – Sign In</title>
  <link rel="stylesheet" href="../css/theme.css">
  <style>
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--bg);
      padding: 20px;
    }

    body::before {
      content: '';
      position: fixed; inset: 0;
      background-image:
        linear-gradient(rgba(56,189,248,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(56,189,248,0.03) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
    }

    .auth-wrap {
      width: 100%; max-width: 420px;
      animation: fadeUp 0.5s ease;
    }
    @keyframes fadeUp {
      from { opacity:0; transform:translateY(20px); }
      to   { opacity:1; transform:translateY(0); }
    }

    .brand {
      text-align: center;
      margin-bottom: 32px;
    }
    .brand-logo {
      width: 52px; height: 52px;
      background: linear-gradient(135deg, rgba(56,189,248,0.2), rgba(129,140,248,0.2));
      border: 1px solid rgba(56,189,248,0.3);
      border-radius: 16px;
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 14px;
      font-size: 24px;
    }
    .brand h1 { font-size: 22px; font-weight: 700; }
    .brand h1 span { color: var(--accent); }
    .brand p { font-size: 13px; color: var(--muted); margin-top: 4px; }

    .auth-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      box-shadow: var(--shadow-lg);
      overflow: hidden;
    }

    .auth-tabs {
      display: flex;
      border-bottom: 1px solid var(--border);
    }
    .auth-tab {
      flex: 1; padding: 14px;
      text-align: center; font-size: 14px; font-weight: 600;
      cursor: pointer; color: var(--muted);
      transition: all 0.2s; border: none; background: none;
      font-family: 'Sora', sans-serif;
    }
    .auth-tab.active { color: var(--text); }
    .auth-tab-indicator {
      height: 2px;
      background: var(--accent);
      transition: transform 0.3s ease;
      transform: translateX(0);
    }

    .auth-body { padding: 28px; }

    .tab-pane { display: none; }
    .tab-pane.active { display: block; }

    .form-group { margin-bottom: 16px; }

    .input-row { display: flex; gap: 12px; }
    .input-row .form-group { flex: 1; }

    .role-select-group { margin-bottom: 16px; }
    .role-options { display: flex; gap: 8px; }
    .role-option {
      flex: 1; padding: 10px 8px;
      border: 1px solid var(--border);
      border-radius: 10px;
      cursor: pointer;
      text-align: center;
      transition: all 0.2s;
      background: var(--surface2);
    }
    .role-option:hover { border-color: var(--border2); }
    .role-option.selected { border-color: var(--accent); background: rgba(56,189,248,0.08); }
    .role-option.selected.admin { border-color: var(--amber); background: rgba(251,191,36,0.08); }
    .role-option-icon { font-size: 18px; margin-bottom: 4px; }
    .role-option-label { font-size: 11px; font-weight: 600; color: var(--muted); }
    .role-option.selected .role-option-label { color: var(--text); }

    .divider {
      display: flex; align-items: center; gap: 12px;
      margin: 20px 0; color: var(--muted); font-size: 12px;
    }
    .divider::before, .divider::after {
      content: ''; flex: 1; height: 1px; background: var(--border);
    }

    .back-link {
      display: block; text-align: center; margin-top: 20px;
      font-size: 12px; color: var(--muted); text-decoration: none;
    }
    .back-link:hover { color: var(--accent); }

    .error-msg {
      background: rgba(248,113,113,0.1);
      border: 1px solid rgba(248,113,113,0.25);
      color: var(--red);
      padding: 10px 14px;
      border-radius: 8px;
      font-size: 12px;
      margin-bottom: 16px;
      display: none;
    }
    .error-msg.show { display: block; }

    .note {
      background: rgba(251,191,36,0.08);
      border: 1px solid rgba(251,191,36,0.2);
      color: var(--amber);
      padding: 10px 14px;
      border-radius: 8px;
      font-size: 11px;
      margin-top: 16px;
      line-height: 1.6;
    }
  </style>
</head>
<body>
<div class="auth-wrap">
  <div class="brand">
    <div class="brand-logo">🚌</div>
    <h1>KTM <span>Transit</span></h1>
    <p>Kathmandu Public Transport Planner</p>
  </div>

  <div class="auth-card">
    <div class="auth-tabs">
      <button class="auth-tab active" id="tabSignIn" onclick="switchTab('signin')">Sign In</button>
      <button class="auth-tab"        id="tabSignUp" onclick="switchTab('signup')">Sign Up</button>
    </div>
    <div class="auth-tab-indicator" id="tabIndicator"></div>

    <div class="auth-body">

      <div class="tab-pane active" id="paneSignin">
        <div class="error-msg" id="signinError"></div>
        <div class="form-group">
          <label class="input-label">Username</label>
          <input class="input" type="text" id="siUsername" placeholder="Enter your username">
        </div>
        <div class="form-group">
          <label class="input-label">Password</label>
          <input class="input" type="password" id="siPassword" placeholder="Enter your password">
        </div>
        <button class="btn btn-primary btn-full" onclick="doSignIn()" style="margin-top:4px">Sign In →</button>

        <div class="note">
          <strong>Demo accounts:</strong><br>
          Admin: <code>admin</code> / <code>admin123</code><br>
          Super Admin: <code>superadmin</code> / <code>super123</code>
        </div>
      </div>

      <div class="tab-pane" id="paneSignup">
        <div class="error-msg" id="signupError"></div>
        <div class="input-row">
          <div class="form-group">
            <label class="input-label">Full Name</label>
            <input class="input" type="text" id="suName" placeholder="Your name">
          </div>
          <div class="form-group">
            <label class="input-label">Username</label>
            <input class="input" type="text" id="suUsername" placeholder="Choose username">
          </div>
        </div>
        <div class="form-group">
          <label class="input-label">Password</label>
          <input class="input" type="password" id="suPassword" placeholder="Create password (min 6 chars)">
        </div>

        <div class="role-select-group">
          <label class="input-label">Account type</label>
          <div class="role-options">
            <div class="role-option selected" id="roleUser" onclick="selectRole('user')">
              <div class="role-option-icon">🗺️</div>
              <div class="role-option-label">User</div>
            </div>
            <div class="role-option" id="roleAdmin" onclick="selectRole('admin')">
              <div class="role-option-icon">🚌</div>
              <div class="role-option-label">Admin</div>
            </div>
          </div>
        </div>

        <button class="btn btn-primary btn-full" onclick="doSignUp()">Create Account →</button>

        <div class="note">
          Admin accounts require Super Admin approval before route mapping access is granted.
        </div>
      </div>

    </div>
  </div>

  <a class="back-link" href="../index.html">← Back to map</a>
</div>

<div class="toast" id="toast"></div>

<script src="../js/db.js"></script>
<script src="../js/pwa.js"></script>
<script>
let db, selectedSignUpRole = 'user';

document.addEventListener('DOMContentLoaded', async () => {
  db = await openDB();
  await seedUsers(db);

  const session = getSession();
  if (session) {
    const params = new URLSearchParams(window.location.search);
    const next = params.get('next') || '../index.html';
    window.location.href = next;
  }
});

function switchTab(tab) {
  const isSignin = tab === 'signin';
  document.getElementById('tabSignIn').classList.toggle('active', isSignin);
  document.getElementById('tabSignUp').classList.toggle('active', !isSignin);
  document.getElementById('paneSignin').classList.toggle('active', isSignin);
  document.getElementById('paneSignup').classList.toggle('active', !isSignin);
  document.getElementById('tabIndicator').style.transform = isSignin ? 'translateX(0)' : 'translateX(100%)';
}

function selectRole(role) {
  selectedSignUpRole = role;
  document.getElementById('roleUser').classList.toggle('selected', role==='user');
  document.getElementById('roleAdmin').classList.toggle('selected', role==='admin');
  document.getElementById('roleAdmin').classList.toggle('admin', role==='admin');
}

async function doSignIn() {
  const username = document.getElementById('siUsername').value.trim();
  const password = document.getElementById('siPassword').value;
  const errEl    = document.getElementById('signinError');

  if (!username || !password) {
    showErr(errEl, 'Please fill in all fields'); return;
  }

  const user = await dbGet(db, STORE_USERS, username);
  if (!user || user.password !== password) {
    showErr(errEl, 'Invalid username or password'); return;
  }

  setSession({ username: user.username, name: user.name, role: user.role });
  showToast('Welcome back, ' + (user.name || user.username) + '!', 'success');

  setTimeout(() => {
    const params = new URLSearchParams(window.location.search);
    const next = params.get('next');
    if (next) { window.location.href = next; return; }
    if (user.role === 'superadmin') window.location.href = 'superadmin.html';
    else if (user.role === 'admin') window.location.href = 'admin.html';
    else window.location.href = '../index.html';
  }, 800);
}

async function doSignUp() {
  const name     = document.getElementById('suName').value.trim();
  const username = document.getElementById('suUsername').value.trim();
  const password = document.getElementById('suPassword').value;
  const errEl    = document.getElementById('signupError');

  if (!name || !username || !password) { showErr(errEl, 'Please fill in all fields'); return; }
  if (password.length < 6)             { showErr(errEl, 'Password must be at least 6 characters'); return; }
  if (!/^[a-zA-Z0-9_]+$/.test(username)) { showErr(errEl, 'Username: letters, numbers and _ only'); return; }

  const existing = await dbGet(db, STORE_USERS, username);
  if (existing) { showErr(errEl, 'Username already taken'); return; }

  const role = selectedSignUpRole === 'admin' ? 'pending_admin' : 'user';
  await dbPut(db, STORE_USERS, { username, password, name, role });

  if (role === 'pending_admin') {
    showToast('Account created! Awaiting Super Admin approval.', 'warn');
    setTimeout(() => switchTab('signin'), 1500);
  } else {
    setSession({ username, name, role });
    showToast('Account created! Welcome!', 'success');
    setTimeout(() => window.location.href = '../index.html', 800);
  }
}

function showErr(el, msg) {
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 3500);
}

document.addEventListener('keypress', e => {
  if (e.key !== 'Enter') return;
  const pane = document.querySelector('.tab-pane.active').id;
  if (pane === 'paneSignin') doSignIn();
  else doSignUp();
});
</script>
</body>
</html>
