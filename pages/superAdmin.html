<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#0f172a">
  <link rel="manifest" href="../manifest.json">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="KTM Transit">
  <link rel="apple-touch-icon" href="../assets/icons/icon-192.png">
  <link rel="icon" type="image/png" sizes="32x32" href="../assets/icons/favicon-32.png">
  <title>KTM Transit – Super Admin</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  <link rel="stylesheet" href="../css/theme.css">
  <style>
    body { overflow: hidden; height: 100vh; display: flex; flex-direction: column; }
    .topnav { flex-shrink: 0; }
    .main-area { display: flex; flex: 1; overflow: hidden; }
    #map { flex: 1; }
    .leaflet-control-zoom { display: none !important; }

    .panel {
      width: 400px; flex-shrink: 0;
      background: var(--surface);
      border-left: 1px solid var(--border);
      display: flex; flex-direction: column; overflow: hidden;
    }

    .panel-tabs {
      display: flex;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .ptab {
      flex: 1; padding: 13px 8px;
      text-align: center; font-size: 12px; font-weight: 600;
      cursor: pointer; color: var(--muted);
      transition: all 0.2s; border: none; background: none;
      font-family: 'Sora', sans-serif; border-bottom: 2px solid transparent;
    }
    .ptab.active { color: var(--text); border-bottom-color: var(--role-superadmin); }

    .panel-body { flex: 1; overflow-y: auto; padding: 14px; }

    .tab-pane { display: none; }
    .tab-pane.active { display: block; }

    .route-card {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 14px;
      margin-bottom: 12px;
      transition: border-color 0.2s;
    }
    .route-card:hover { border-color: var(--border2); }

    .rc-header {
      display: flex; justify-content: space-between;
      align-items: flex-start; gap: 8px; margin-bottom: 8px;
    }
    .rc-name { font-size: 14px; font-weight: 600; }
    .rc-meta { font-size: 11px; color: var(--muted); margin-top: 3px; line-height: 1.6; }

    .status-pill {
      font-size: 10px; font-weight: 600;
      padding: 3px 9px; border-radius: 20px; flex-shrink: 0;
    }
    .status-pill.pending  { background: rgba(251,191,36,0.15);  color: var(--amber); border: 1px solid rgba(251,191,36,0.3); }
    .status-pill.approved { background: rgba(52,211,153,0.15);  color: var(--green); border: 1px solid rgba(52,211,153,0.3); }
    .status-pill.rejected { background: rgba(248,113,113,0.15); color: var(--red);   border: 1px solid rgba(248,113,113,0.3); }

    .rc-actions { display: flex; gap: 6px; margin-top: 10px; flex-wrap: wrap; }
    .rc-actions .btn { flex: 1; min-width: 72px; }

    .user-card {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 12px 14px;
      margin-bottom: 10px;
      display: flex; align-items: center; gap: 12px;
    }
    .user-avatar {
      width: 36px; height: 36px; border-radius: 50%;
      background: rgba(244,114,182,0.15);
      border: 1px solid rgba(244,114,182,0.25);
      display: flex; align-items: center; justify-content: center;
      font-size: 15px; flex-shrink: 0;
    }
    .user-info { flex: 1; min-width: 0; }
    .user-name { font-size: 13px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .user-meta { font-size: 11px; color: var(--muted); margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .user-actions { display: flex; gap: 6px; flex-shrink: 0; }

    .stats-bar {
      display: flex; gap: 8px;
      padding: 12px 14px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .stat-box {
      flex: 1; background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 10px; padding: 10px 8px;
      text-align: center;
    }
    .stat-val { font-size: 20px; font-weight: 700; font-family: 'JetBrains Mono', monospace; }
    .stat-label { font-size: 10px; color: var(--muted); margin-top: 2px; }
    .stat-val.amber { color: var(--amber); }
    .stat-val.green { color: var(--green); }
    .stat-val.pink  { color: var(--role-superadmin); }

    .empty-state { text-align: center; padding: 32px 16px; color: var(--muted); font-size: 12px; line-height: 1.7; }

    .map-controls {
      position: absolute; bottom: 16px; right: 420px;
      z-index: 1000; display: flex; flex-direction: column; gap: 8px;
    }
    .fab {
      width: 44px; height: 44px; background: var(--surface);
      border: 1px solid var(--border); border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; transition: all 0.2s; box-shadow: var(--shadow);
    }
    .fab:hover { background: var(--surface2); }
    .fab svg { width: 20px; height: 20px; color: var(--text); }

    @media (max-width: 768px) {
      body { overflow: auto; height: auto; min-height: 100vh; }

      .main-area { flex-direction: column; overflow: visible; }

      #map {
        height: 38vh;
        min-height: 240px;
        flex: none;
        position: sticky;
        top: 0;
        z-index: 10;
      }

      .panel {
        width: 100%;
        border-left: none;
        border-top: 1px solid var(--border);
        overflow: visible;
        max-height: none;
      }

      .panel-body {
        overflow: visible;
        padding-bottom: 80px;
      }

      .map-controls {
        right: 12px;
        bottom: auto;
        top: calc(38vh - 110px);
        z-index: 20;
      }

      .stats-bar { gap: 6px; padding: 10px 12px; }
      .stat-val  { font-size: 18px; }
      .stat-label{ font-size: 9px; }

      .rc-actions { gap: 6px; }
      .rc-actions .btn { font-size: 11px; padding: 7px 8px; }

      .user-card { flex-wrap: wrap; }
      .user-info { min-width: 0; flex-basis: calc(100% - 52px); }
      .user-actions {
        width: 100%;
        margin-top: 8px;
        padding-top: 8px;
        border-top: 1px solid var(--border);
        justify-content: flex-end;
      }
      .user-actions .btn { font-size: 11px; padding: 7px 12px; }
    }

    @media (max-width: 400px) {
      .rc-actions { flex-direction: column; }
      .rc-actions .btn { width: 100%; }
      .ptab { font-size: 11px; padding: 11px 4px; }
    }
  </style>
</head>
<body>

<nav class="topnav">
  <a class="topnav-brand" href="../index.html">🚌 KTM <span>Transit</span></a>
  <div class="topnav-links">
    <a class="topnav-link" href="admin.html">Route Mapping</a>
    <a class="topnav-link active" href="superadmin.html">Approvals</a>
    <a class="topnav-link" href="../index.html">← Back</a>
  </div>
  <div class="topnav-right">
    <span id="navRoleBadge"></span>
    <button class="btn btn-ghost btn-sm" onclick="doLogout()">Sign Out</button>
  </div>
</nav>

<div class="main-area">
  <div id="map"></div>

  <div class="panel">

    <div class="stats-bar" id="statsBar">
      <div class="stat-box"><div class="stat-val amber" id="statPending">0</div><div class="stat-label">Pending</div></div>
      <div class="stat-box"><div class="stat-val green" id="statApproved">0</div><div class="stat-label">Approved</div></div>
      <div class="stat-box"><div class="stat-val pink"  id="statUsers">0</div><div class="stat-label">Admins</div></div>
    </div>

    <div class="panel-tabs">
      <button class="ptab active" onclick="switchTab('routes')">Route Approvals</button>
      <button class="ptab"        onclick="switchTab('users')">Admin Users</button>
    </div>

    <div class="panel-body">

      <div class="tab-pane active" id="paneRoutes">
        <div id="routesList"><div class="empty-state">Loading…</div></div>
      </div>

      <div class="tab-pane" id="paneUsers">
        <div id="usersList"><div class="empty-state">Loading…</div></div>
      </div>

    </div>
  </div>
</div>

<div class="map-controls">
  <button class="fab" onclick="map.zoomIn()">
    <svg fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
  </button>
  <button class="fab" onclick="map.zoomOut()">
    <svg fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2.5"><line x1="5" y1="12" x2="19" y2="12"></line></svg>
  </button>
</div>

<div class="toast" id="toast"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="../js/db.js"></script>
<script src="../js/pwa.js"></script>
<script>
let map, db, session;
let previewLayers = [];

document.addEventListener('DOMContentLoaded', async () => {
  session = requireRole(['superadmin'], 'login.html?next=superadmin.html');
  if (!session) return;

  document.getElementById('navRoleBadge').innerHTML = `<span class="role-badge superadmin">super admin</span>`;

  db = await openDB();
  await seedUsers(db);

  map = L.map('map', { zoomControl: false }).setView([27.7172, 85.3240], 13);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '© OpenStreetMap contributors'
  }).addTo(map);

  const approved = await dbGetAll(db, STORE_ROUTES);
  approved.forEach(r => {
    if (r.stops?.length > 1) {
      L.polyline(r.stops.map(s=>[s.lat,s.lon]), { color:'#34d399', weight:3, opacity:0.4 }).addTo(map);
    }
  });

  await refreshAll();
});

function switchTab(tab) {
  document.querySelectorAll('.ptab').forEach((t,i) => {
    t.classList.toggle('active', (i===0 && tab==='routes') || (i===1 && tab==='users'));
  });
  document.getElementById('paneRoutes').classList.toggle('active', tab==='routes');
  document.getElementById('paneUsers').classList.toggle('active', tab==='users');
}

async function refreshAll() {
  const pending  = await dbGetAll(db, STORE_PENDING);
  const approved = await dbGetAll(db, STORE_ROUTES);
  const users    = await dbGetAll(db, STORE_USERS);
  const admins   = users.filter(u => u.role==='admin'||u.role==='pending_admin');

  document.getElementById('statPending').textContent  = pending.filter(r=>r.status==='pending').length;
  document.getElementById('statApproved').textContent = approved.length;
  document.getElementById('statUsers').textContent    = admins.length;

  renderRoutes(pending);
  renderUsers(users);
}

function renderRoutes(routes) {
  const c = document.getElementById('routesList');
  if (!routes.length) {
    c.innerHTML = '<div class="empty-state">No submitted routes yet.<br>Admins submit routes from the Route Mapping page.</div>';
    return;
  }
  const sorted = [...routes].sort((a,b) => {
    const order = { pending:0, approved:1, rejected:2 };
    return (order[a.status]??3) - (order[b.status]??3);
  });
  c.innerHTML = sorted.map(r => `
    <div class="route-card">
      <div class="rc-header">
        <div>
          <div class="rc-name">${escapeHtml(r.name)}</div>
          <div class="rc-meta">
            ${r.stops.length} stops · every ${r.frequency} min<br>
            By: <strong>${escapeHtml(r.submittedBy)}</strong> · ${new Date(r.submittedAt).toLocaleDateString()}
          </div>
        </div>
        <span class="status-pill ${escapeHtml(r.status)}">${escapeHtml(r.status)}</span>
      </div>
      <div class="rc-actions">
        <button class="btn btn-secondary btn-sm" onclick="previewOnMap(${r.id})">👁 Preview</button>
        ${r.status==='pending' ? `
          <button class="btn btn-success btn-sm" onclick="approveRoute(${r.id})">✓ Approve</button>
          <button class="btn btn-danger btn-sm"  onclick="rejectRoute(${r.id})">✕ Reject</button>
        ` : `
          <button class="btn btn-danger btn-sm" onclick="removeRoute(${r.id})">🗑 Remove</button>
        `}
      </div>
    </div>`).join('');
}

function renderUsers(users) {
  const c = document.getElementById('usersList');
  const relevant = users.filter(u => u.role !== 'superadmin');
  if (!relevant.length) {
    c.innerHTML = '<div class="empty-state">No users yet.</div>'; return;
  }
  c.innerHTML = relevant.map(u => {
    const safeRole     = escapeHtml(u.role);
    const safeName     = escapeHtml(u.name || u.username);
    const safeUsername = escapeHtml(u.username);
    const avatarIcon   = u.role==='admin' ? '🔧' : u.role==='pending_admin' ? '⏳' : '👤';
    const badgeRole    = u.role==='pending_admin' ? 'admin' : safeRole;
    return `
      <div class="user-card">
        <div class="user-avatar">${avatarIcon}</div>
        <div class="user-info">
          <div class="user-name">${safeName}</div>
          <div class="user-meta">@${safeUsername}</div>
          <div style="margin-top:4px"><span class="role-badge ${badgeRole}">${safeRole.replace('_',' ')}</span></div>
        </div>
        <div class="user-actions">
          ${u.role==='pending_admin' ? `<button class="btn btn-success btn-sm" onclick="approveAdmin('${safeUsername}')">Approve</button>` : ''}
          ${u.role==='admin' ? `<button class="btn btn-danger btn-sm" onclick="revokeAdmin('${safeUsername}')">Revoke</button>` : ''}
          ${u.role==='user' ? `<button class="btn btn-amber btn-sm" onclick="promoteAdmin('${safeUsername}')">Make Admin</button>` : ''}
        </div>
      </div>`;
  }).join('');
}

async function previewOnMap(id) {
  previewLayers.forEach(l => map.removeLayer(l));
  previewLayers = [];
  const all = await dbGetAll(db, STORE_PENDING);
  const r   = all.find(x => x.id === id);
  if (!r || r.stops.length < 2) return;

  const line = L.polyline(r.stops.map(s=>[s.lat,s.lon]), { color:'#818cf8', weight:5, opacity:0.9 }).addTo(map);
  r.stops.forEach((s, i) => {
    const m = L.circleMarker([s.lat,s.lon], {
      radius: i===0||i===r.stops.length-1 ? 9 : 6,
      fillColor: i===0 ? '#34d399' : i===r.stops.length-1 ? '#f87171' : '#818cf8',
      color:'#fff', weight:2, fillOpacity:1
    }).addTo(map);
    previewLayers.push(m);
  });
  previewLayers.push(line);
  map.fitBounds(line.getBounds(), { padding:[40,40] });
}

async function approveRoute(id) {
  if (!confirm('Approve this route? It will go live for all users.')) return;
  const all = await dbGetAll(db, STORE_PENDING);
  const r   = all.find(x => x.id === id);
  if (!r) return;

  r.status = 'approved';
  r.approvedAt = new Date().toISOString();
  r.approvedBy = session.username;
  const { id: pendingId, ...routeData } = r;
  await dbAdd(db, STORE_ROUTES, { ...routeData, pendingId });
  await dbPut(db, STORE_PENDING, { ...r, status: 'approved' });

  showToast('Route approved and published ✓', 'success');
  await refreshAll();
}

async function rejectRoute(id) {
  const reason = prompt('Reason for rejection (optional):');
  const all = await dbGetAll(db, STORE_PENDING);
  const r   = all.find(x => x.id === id);
  if (!r) return;
  await dbPut(db, STORE_PENDING, { ...r, status: 'rejected', rejectionReason: reason || '', rejectedAt: new Date().toISOString() });
  showToast('Route rejected');
  await refreshAll();
}

async function removeRoute(id) {
  if (!confirm('Remove this route record?')) return;
  await dbDelete(db, STORE_PENDING, id);
  showToast('Record removed');
  await refreshAll();
}

async function approveAdmin(username) {
  const user = await dbGet(db, STORE_USERS, username);
  if (!user) return;
  await dbPut(db, STORE_USERS, { ...user, role: 'admin' });
  showToast(`${user.name || username} is now an Admin ✓`, 'success');
  await refreshAll();
}

async function revokeAdmin(username) {
  if (!confirm(`Revoke admin access for ${username}?`)) return;
  const user = await dbGet(db, STORE_USERS, username);
  if (!user) return;
  await dbPut(db, STORE_USERS, { ...user, role: 'user' });
  showToast('Admin access revoked');
  await refreshAll();
}

async function promoteAdmin(username) {
  if (!confirm(`Grant admin access to ${username}?`)) return;
  const user = await dbGet(db, STORE_USERS, username);
  if (!user) return;
  await dbPut(db, STORE_USERS, { ...user, role: 'admin' });
  showToast(`${user.name || username} promoted to Admin ✓`, 'success');
  await refreshAll();
}

function doLogout() {
  clearSession();
  window.location.href = '../index.html';
}
</script>
</body>
</html>
